<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cable Latín System - Login</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/index.css" />
  </head>

  <body
    class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4"
  >
    <div class="container bg-gray-800 p-8 rounded-lg shadow-xl w-full max-w-sm">
      <i
        data-lucide="monitor"
        class="logo-icon text-blue-400 w-16 h-16 mx-auto mb-4"
      ></i>

      <h1 class="text-3xl font-bold text-center mb-6 uppercase">CABLE LATÍN</h1>

      <form id="loginForm" class="space-y-4">
        <div>
          <label for="usuario" class="block text-sm font-medium text-gray-300"
            >Usuario</label
          >
          <input
            type="text"
            id="usuario"
            placeholder="Ingresar su usuario"
            required
            class="mt-1 block w-full p-3 bg-gray-700 border border-gray-600 rounded-md text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          />
        </div>

        <div>
          <label
            for="contrasena"
            class="block text-sm font-medium text-gray-300"
            >Contraseña</label
          >
          <input
            type="password"
            id="contrasena"
            placeholder="Ingresar su contraseña"
            required
            class="mt-1 block w-full p-3 bg-gray-700 border border-gray-600 rounded-md text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          />
        </div>

        <button
          type="submit"
          id="loginBtn"
          class="w-full bg-blue-600 text-white p-3 rounded-md font-bold hover:bg-blue-700 transition-colors flex items-center justify-center space-x-2"
        >
          <span class="spinner"></span>
          <span class="btn-text">INGRESAR</span>
        </button>
      </form>

      <p id="msg-box" class="mt-4 text-center text-sm"></p>
    </div>

    <style>
      .spinner {
        display: none;
        width: 20px;
        height: 20px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: #ffffff;
        animation: spin 1s ease-in-out infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .loading .spinner {
        display: block;
      }

      .loading .btn-text {
        display: none;
      }
    </style>

    <!-- api.js debe cargarse primero: define Session, AuthAPI y APP_ROUTES -->
    <script src="js/api.js"></script>
    <!-- login.js consume lo definido en api.js -->
    <script src="js/login.js"></script>
  </body>
</html>
