<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - CABLE LATIN</title>

    <!-- Fuentes y CDN de Íconos -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Estilos Unificados de la Suite -->
    <link rel="stylesheet" href="css/tablero.css">
    <link rel="stylesheet" href="css/usuario.css">
</head>
<body class="bg-gray-100">

    <!-- Sidebar Dinámico -->
    <aside id="sidebar-container" class="hidden lg:block z-30">
        <!-- El contenido se renderiza dinámicamente mediante js/sidebar.js -->
    </aside>

    <!-- Contenido Principal -->
    <main class="main-content p-4 md:p-8">

        <!-- Botón hamburguesa móvil -->
        <button id="mobile-menu-toggle" class="lg:hidden fixed top-4 left-4 bg-blue-600 text-white p-3 rounded-full shadow-lg z-40">
            <i class="fas fa-bars"></i>
        </button>

        <header class="flex justify-between items-center mb-6 pl-14 lg:pl-0">
            <div>
                <p class="text-sm text-gray-500 mb-1">Administración / Usuarios</p>
                <h1 class="text-3xl font-bold text-gray-800">Usuarios</h1>
            </div>
            <button onclick="location.href='crearUsuario.html'"
                class="bg-blue-600 text-white px-4 py-2 rounded-lg shadow-md hover:bg-blue-700 transition-colors flex items-center space-x-2">
                <i class="fas fa-plus"></i>
                <span class="hidden md:inline">Añadir Usuario</span>
            </button>
        </header>

        <!-- Tabla de Usuarios -->
        <div class="bg-white p-6 rounded-xl shadow-lg">

            <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                <div>
                    <label for="show-entries" class="text-sm text-gray-600 mr-2">Mostrar</label>
                    <select id="show-entries" class="border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="10" selected>10</option>
                        <option value="25">25</option>
                        <option value="50">50</option>
                    </select>
                    <span class="text-sm text-gray-600 ml-2">registros</span>
                </div>
                <div class="relative w-full md:w-72">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                        <i class="fas fa-search text-gray-400"></i>
                    </span>
                    <input type="search" id="search-table" placeholder="Buscar usuario..."
                        class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <div class="overflow-x-auto rounded-lg border border-gray-200">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-gray-700 border-b border-gray-200">
                            <th class="p-4 font-semibold text-sm uppercase text-gray-500">ID</th>
                            <th class="p-4 font-semibold text-sm uppercase text-gray-500">Usuario</th>
                            <th class="p-4 font-semibold text-sm uppercase text-gray-500">Nombre</th>
                            <th class="p-4 font-semibold text-sm uppercase text-gray-500">Correo</th>
                            <th class="p-4 font-semibold text-sm uppercase text-gray-500">Teléfono</th>
                            <th class="p-4 font-semibold text-sm uppercase text-gray-500">Rol</th>
                            <th class="p-4 font-semibold text-sm uppercase text-gray-500">Estado</th>
                            <th class="p-4 font-semibold text-sm uppercase text-gray-500 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="usuarios-table-body" class="divide-y divide-gray-100 text-gray-700 text-sm">
                        <tr>
                            <td colspan="8" class="text-center p-8 text-gray-500">
                                <i class="fas fa-spinner fa-spin mr-2"></i> Cargando usuarios...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="flex flex-col sm:flex-row justify-between items-center mt-6 gap-4">
                <span class="text-sm text-gray-500" id="footer-info">Mostrando 0 de 0 registros</span>
            </div>
        </div>

    </main>

    <!-- Overlay móvil -->
    <div id="sidebar-overlay"
        class="fixed inset-0 bg-black bg-opacity-50 z-20 hidden lg:hidden"
        onclick="closeMobileSidebar()">
    </div>

    <!-- Modal de Confirmar Eliminación -->
    <div id="confirmDeleteModal" class="usr-modal-overlay">
        <div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm relative transform transition-all scale-95 usr-modal-content">
            <h3 class="text-lg font-bold text-red-600 mb-2">
                <i class="fas fa-exclamation-triangle mr-2"></i> Confirmar Eliminación
            </h3>
            <p id="modalDeleteMessage" class="text-sm text-gray-600 mb-6">
                ¿Estás seguro de que deseas eliminar este usuario? Esta acción no se puede deshacer.
            </p>
            <div class="flex justify-end gap-3">
                <button id="modalCancelDelete"
                    class="px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium text-sm transition">
                    Cancelar
                </button>
                <button id="modalConfirmDelete"
                    class="px-4 py-2 rounded-lg bg-red-600 hover:bg-red-700 text-white font-medium text-sm transition">
                    Sí, Eliminar
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts de Integración -->
    <script src="js/api.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/usuario.js" type="module"></script>
</body>
</html>
