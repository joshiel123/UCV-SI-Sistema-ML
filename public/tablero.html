<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CABLE LATIN</title>
    
    <!-- Fuentes y CDN de Íconos -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Chart.js para visualizaciones analíticas -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Estilos Unificados de la Suite -->
    <link rel="stylesheet" href="css/tablero.css">
</head>
<body class="bg-gray-100">

    <!-- Sidebar Dinámico (Ancho y estilos gestionados de forma unificada por css/tablero.css) -->
    <aside id="sidebar-container" class="hidden lg:block z-30">
        <!-- El contenido se renderiza dinámicamente mediante js/sidebar.js -->
    </aside>

    <!-- Contenido Principal -->
    <main class="main-content p-4 md:p-8">
        
        <!-- Botón hamburguesa móvil -->
        <button id="mobile-menu-toggle" class="lg:hidden fixed top-4 left-4 bg-blue-600 text-white p-3 rounded-full shadow-lg z-40">
            <i class="fas fa-bars"></i>
        </button>

        <header class="flex justify-between items-center mb-6 pl-14 lg:pl-0">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">Tablero</h1>
                <p class="text-gray-500">Resumen general de tu sistema.</p>
            </div>
            <button onclick="window.location.href='registrar_cliente.html'"
                class="bg-blue-600 text-white px-4 py-2 rounded-lg shadow-md hover:bg-blue-700 transition-colors flex items-center space-x-2">
                <i class="fas fa-plus"></i>
                <span class="hidden md:inline">Añadir Cliente</span>
            </button>
        </header>

        <!-- Tarjetas de Resumen KPI -->
        <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            
            <div class="bg-white p-6 rounded-xl shadow-lg flex items-center space-x-4 border-l-4 border-blue-600">
                <div class="bg-blue-100 text-blue-600 p-4 rounded-full">
                    <i class="fas fa-users fa-2x"></i>
                </div>
                <div>
                    <h3 class="text-gray-500 text-sm font-medium">Clientes Totales</h3>
                    <p id="count-clientes" class="text-3xl font-bold text-gray-800 card-value flex items-center">
                        <i class="fas fa-spinner fa-spin text-gray-300"></i>
                    </p>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-lg flex items-center space-x-4 border-l-4 border-green-600">
                <div class="bg-green-100 text-green-600 p-4 rounded-full">
                    <i class="fas fa-folder-open fa-2x"></i>
                </div>
                <div>
                    <h3 class="text-gray-500 text-sm font-medium">Servicios Activos</h3>
                    <p id="count-planes" class="text-3xl font-bold text-gray-800 card-value flex items-center">
                        <i class="fas fa-spinner fa-spin text-gray-300"></i>
                    </p>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-lg flex items-center space-x-4 border-l-4 border-yellow-600">
                <div class="bg-yellow-100 text-yellow-600 p-4 rounded-full">
                    <i class="fas fa-hourglass-half fa-2x"></i>
                </div>
                <div>
                    <h3 class="text-gray-500 text-sm font-medium">Servicios Suspendidos</h3>
                    <p id="count-pendientes" class="text-3xl font-bold text-gray-800 card-value flex items-center">
                        <i class="fas fa-spinner fa-spin text-gray-300"></i>
                    </p>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-lg flex items-center space-x-4 border-l-4 border-indigo-600">
                <div class="bg-indigo-100 text-indigo-600 p-4 rounded-full">
                    <i class="fas fa-dollar-sign fa-2x"></i>
                </div>
                <div>
                    <h3 class="text-gray-500 text-sm font-medium">Ingresos Totales</h3>
                    <p id="count-ingresos" class="text-3xl font-bold text-gray-800 card-value flex items-center">
                        <i class="fas fa-spinner fa-spin text-gray-300"></i>
                    </p>
                </div>
            </div>

        </section>

        <!-- Gráficos Analíticos -->
        <section class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            
            <div class="bg-white p-6 rounded-xl shadow-lg">
                <h3 class="text-xl font-semibold text-gray-700 mb-4">Servicios Activos por Plan</h3>
                <div class="chart-container" id="container-activePlansChart">
                    <canvas id="activePlansChart"></canvas>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-lg">
                <h3 class="text-xl font-semibold text-gray-700 mb-4">Nuevos Clientes (Últ. 6 Meses)</h3>
                <div class="chart-container" id="container-newClientsChart">
                    <canvas id="newClientsChart"></canvas>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-lg">
                <h3 class="text-xl font-semibold text-gray-700 mb-4">Ingresos por Día (Últ. 30 Días)</h3>
                <div class="chart-container" id="container-monthlyIncomeChart">
                    <canvas id="monthlyIncomeChart"></canvas>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-lg">
                <h3 class="text-xl font-semibold text-gray-700 mb-4">Servicios Suspendidos por Plan</h3>
                <div class="chart-container" id="container-inactivePlansChart">
                    <canvas id="inactivePlansChart"></canvas>
                </div>
            </div>

        </section>
    </main>

    <!-- Overlay móvil -->
    <div id="sidebar-overlay"
        class="fixed inset-0 bg-black bg-opacity-50 z-20 hidden lg:hidden"
        onclick="closeMobileSidebar()">
    </div>

    <!-- Scripts de Integración -->
    <script src="js/api.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/tablero.js"></script>
</body>
</html>
