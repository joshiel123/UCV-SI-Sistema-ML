<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Usuario - Cable Latín</title>

    <!-- Fuentes y CDN de íconos -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Estilos específicos -->
    <link rel="stylesheet" href="css/crearUsuario.css">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-lg">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Crear Nuevo Usuario</h1>
        <form id="crearUsuarioForm" class="space-y-4">
            <div class="form-group">
                <label for="nombre" class="block text-sm font-medium text-gray-700">Nombre Completo:</label>
                <input type="text" id="nombre" name="nombre" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500" />
            </div>
            <div class="form-group">
                <label for="usuario" class="block text-sm font-medium text-gray-700">Nombre de Usuario (Login):</label>
                <input type="text" id="usuario" name="usuario" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500" />
            </div>
            <div class="form-group">
                <label for="correo" class="block text-sm font-medium text-gray-700">Correo Electrónico:</label>
                <input type="email" id="correo" name="correo" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500" />
            </div>
            <div class="form-group">
                <label for="contrasena" class="block text-sm font-medium text-gray-700">Contraseña:</label>
                <input type="password" id="contrasena" name="contrasena" required minlength="6" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500" />
                <p class="text-xs text-gray-500 mt-1">Mínimo 6 caracteres.</p>
            </div>
            <div class="form-group">
                <label for="telefono" class="block text-sm font-medium text-gray-700">Teléfono:</label>
                <input type="tel" id="telefono" name="telefono" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500" />
            </div>
            <div class="form-group">
                <label for="rol" class="block text-sm font-medium text-gray-700">Rol:</label>
                <select id="rol" name="rol" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md bg-white focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                    <option value="" disabled selected>-- Seleccione un rol --</option>
                    <option value="vendedor">Vendedor</option>
                    <option value="supervisor">Supervisor</option>
                    <option value="administrador">Administrador</option>
                </select>
            </div>
            <div class="form-group">
                <label for="estado" class="block text-sm font-medium text-gray-700">Estado:</label>
                <select id="estado" name="estado" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md bg-white focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                    <option value="Activo">Activo</option>
                    <option value="Inactivo">Inactivo</option>
                </select>
            </div>
            <div class="flex items-center justify-end space-x-4 pt-4">
                <button type="button" class="bg-gray-200 text-gray-800 px-4 py-2 rounded-md hover:bg-gray-300" onclick="window.history.back()">Cancelar</button>
                <button type="submit" id="btnGuardar" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 flex items-center justify-center space-x-2 w-32">
                    <i data-lucide="save" class="w-5 h-5 icon-save"></i>
                    <i data-lucide="loader" class="w-5 h-5 icon-loader spinner" style="display: none;"></i>
                    <span id="btn-text">Guardar</span>
                </button>
            </div>
        </form>
    </div>

    <!-- Modal de Feedback -->
    <div id="feedbackModal" class="fixed inset-0 bg-gray-800 bg-opacity-75 flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-white rounded-lg shadow-lg max-w-sm w-full p-6 text-center">
            <i id="modalIcon" class="w-16 h-16 mx-auto mb-4"></i>
            <h3 id="modalTitle" class="text-xl font-bold mb-2"></h3>
            <p id="modalMessage" class="text-gray-600 mb-6"></p>
            <button id="modalClose" class="bg-blue-600 text-white px-4 py-2 rounded-md w-full">Entendido</button>
        </div>
    </div>

    <!-- Scripts de lógica -->
    <script src="js/api.js"></script>
    <script src="js/crearUsuario.js" type="module"></script>
</body>
</html>
