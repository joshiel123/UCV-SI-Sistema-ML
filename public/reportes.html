<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reportes - Cable Latín</title>

    <!-- Lucide Icons -->
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <!-- Styles -->
    <link rel="stylesheet" href="css/sidebar.css" />
    <link rel="stylesheet" href="css/reportes.css" />
</head>
<body>
    <!-- Sidebar container (populated dynamically by js/sidebar.js) -->
    <aside id="sidebar-container"></aside>

    <div class="main-content">
        <main class="container">
            <h1>Gestión de Reportes</h1>

            <div class="filtros-container">
                <div class="filtro-grupo">
                    <label for="fechaDesde">Filtrar Desde</label>
                    <input type="date" id="fechaDesde" />
                </div>
                <div class="filtro-grupo">
                    <label for="fechaHasta">Filtrar Hasta</label>
                    <input type="date" id="fechaHasta" />
                </div>
                <button id="btnGenerarExcel" class="btn btn-excel" disabled>
                    <i data-lucide="loader" class="icon icon-loader" id="loader-icon"></i>
                    <i data-lucide="file-spreadsheet" class="icon icon-ready" id="excel-icon" style="display: none;"></i>
                    <span id="btn-excel-text">Iniciando reporte...</span>
                </button>
            </div>

            <!-- Tabla de Resumen KPI -->
            <div class="table-container">
                <table id="reportes-table">
                    <thead>
                        <tr>
                            <th>Indicador KPI</th>
                            <th>Monto / Conteo</th>
                            <th>Descripción</th>
                            <th>Estado Actual</th>
                        </tr>
                    </thead>
                    <tbody id="reportes-table-body">
                        <tr>
                            <td colspan="4" style="text-align: center; padding: 20px;">
                                <i class="fas fa-spinner fa-spin"></i> Cargando resumen financiero de Firestore...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/reportes.js"></script>
</body>
</html>
